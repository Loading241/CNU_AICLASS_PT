<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>문의사항 | Portfolio</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <nav class="navbar">
      <ul class="nav-links">
        <li><a href="index.html">소개</a></li>
        <li><a href="activities.html">활동</a></li>
        <li><a href="contact.html" class="active">문의</a></li>
      </ul>
    </nav>
  </header>

  <main class="contact-section">
    <h1>문의사항</h1>
    <p>궁금한 점이나 제안이 있으면 아래 양식으로 남겨주세요.</p>

    <form id="contactForm" class="contact-form">
      <label for="name">이름</label>
      <input type="text" id="name" name="name" required>

      <label for="email">이메일</label>
      <input type="email" id="email" name="email" required>

      <label for="message">문의 내용</label>
      <textarea id="message" name="message" rows="6" required></textarea>

      <button type="submit">보내기</button>
    </form>

    <p id="formStatus" class="form-status" role="status"></p>
  </main>

  <script src="script.js"></script>
</body>
</html>
